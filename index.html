<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sentence Scramble - Accessible Version</title>

<style>
body { 
  font-family: Arial, sans-serif;
  text-align: center; 
  padding: 15px; 
  font-size: 18px;
  line-height: 1.6;
  background-color: #fff;
  color: #000;
}

h1, h2 { font-size: 28px; }
h3 { font-size: 22px; }

#questionNumber { 
  font-size: 18px; 
  color: #333; 
  margin: 15px 0; 
  font-weight: bold; 
  aria-live: "polite";
}

#arabic { 
  font-size: 24px; 
  color: darkblue; 
  margin: 15px; 
  padding: 15px;
  background-color: #f0f0f0;
}

#scrambled, #answer { 
  margin: 20px 0; 
  min-height: 60px;
  padding: 10px;
}

button { 
  font-size: 18px; 
  margin: 8px; 
  padding: 12px 15px;
  background-color: #007bff;
  color: white;
  border: 2px solid #0056b3;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.2s;
}

button:hover {
  background-color: #0056b3;
}

button:focus {
  outline: 3px solid #ffb81c;
  outline-offset: 2px;
}

button:disabled { 
  opacity: 0.5; 
  cursor: not-allowed;
}

#answer { 
  border: 3px solid #333; 
  padding: 15px;
  min-height: 50px;
  background-color: #f9f9f9;
  margin: 15px;
}

.correct { 
  background-color: #90EE90; 
  color: #000;
  border-color: #228B22;
}

.wrong { 
  background-color: #FFB6C6; 
  color: #000;
  border-color: #DC143C;
}

#score { 
  font-size: 20px;
  margin: 20px 0;
  font-weight: bold;
  aria-live: "polite";
}

textarea { 
  width: 90%; 
  height: 120px; 
  margin: 15px; 
  padding: 10px;
  font-size: 16px;
  font-family: Arial, sans-serif;
}

label {
  display: block;
  font-weight: bold;
  margin: 10px 0 5px 0;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

#status {
  font-weight: bold;
  margin: 15px 0;
  min-height: 30px;
  aria-live: "assertive";
}

.button-group {
  margin: 20px 0;
}

.audio-controls {
  margin: 15px 0;
  padding: 15px;
  background-color: #f5f5f5;
  border-radius: 5px;
}

.reset-button {
  background-color: #dc3545;
  border-color: #c82333;
  margin-top: 10px;
}

.reset-button:hover {
  background-color: #c82333;
}

.format-info {
  background-color: #e7f3ff;
  padding: 10px;
  margin: 10px 0;
  border-left: 4px solid #007bff;
  text-align: left;
  font-size: 16px;
}

@media (max-width: 600px) {
  body { 
    font-size: 16px;
    padding: 10px;
  }
  button { 
    font-size: 16px; 
    padding: 10px 12px;
    margin: 6px;
  }
  h1, h2 { font-size: 24px; }
  h3 { font-size: 20px; }
}
</style>

</head>
<body>

<main>
  <h1>Sentence Scramble Game</h1>

  <div id="questionNumber" aria-live="polite" aria-atomic="true"></div>

  <section aria-label="Question">
    <p>Arabic sentence:</p>
    <div id="arabic" role="heading" aria-level="3"></div>
  </section>

  <section class="audio-controls" aria-label="Audio Controls">
    <p><strong>Listen to the sentence:</strong></p>
    <button aria-label="Listen to full sentence" onclick="speakCurrent()">🔊 Full Sentence</button>
    <button aria-label="Listen to sentence word by word slowly" onclick="speakSlow()">🐢 Word by Word</button>
    
    <p style="margin-top: 15px;"><strong>Listen to scrambled words:</strong></p>
    <button aria-label="Listen to each scrambled word one by one" onclick="speakScrambledWords()">📢 Scrambled Words</button>
  </section>

  <section aria-label="Word buttons">
    <p>Click the words to arrange the sentence:</p>
    <div id="scrambled" role="group" aria-label="Word options"></div>
  </section>

  <section aria-label="Answer">
    <h2>Your Answer:</h2>
    <div id="answer" role="textbox" aria-live="polite" aria-label="Your current answer"></div>
    <div id="status" role="status" aria-live="assertive" aria-label="Feedback"></div>
  </section>

  <section class="button-group" aria-label="Game controls">
    <button onclick="checkAnswer()">✓ Check Answer</button>
    <button onclick="clearAnswer()">⟲ Clear</button>
    <button id="prevBtn" onclick="prevQuestion()">← Previous</button>
    <button id="nextBtn" onclick="nextQuestion()">Next →</button>
  </section>

  <section aria-label="Score">
    <h2 id="score"></h2>
  </section>

  <section aria-label="Add custom questions">
    <h2>Add Your Own Sentences</h2>
    
    <div class="format-info">
      <strong>Format:</strong> English sentence | Arabic translation<br>
      <strong>Example:</strong><br>
      hello world | مرحبا بالعالم<br>
      how are you | كيف حالك
    </div>

    <label for="customInput">Enter sentences (one per line, English | Arabic):</label>
    <textarea id="customInput" placeholder="Example:&#10;hello world | مرحبا بالعالم&#10;how are you | كيف حالك"></textarea>
    <br>
    <button onclick="loadCustom()">Load Custom Questions</button>
    <button class="reset-button" onclick="resetToDefault()">Reset to Default Sentences</button>
  </section>
</main>

<script>
// ===== DEFAULT QUESTIONS =====
const DEFAULT_QUESTIONS = [
  { en: "this is a book", ar: "هذا كتاب" },
  { en: "she is reading a story", ar: "هي تقرأ قصة" },
  { en: "we are learning english today", ar: "نحن نتعلم الإنجليزية اليوم" },
  { en: "the cat is on the table", ar: "القطة على الطاولة" },
  { en: "they are playing football", ar: "هم يلعبون كرة القدم" }
];

let questions = [...DEFAULT_QUESTIONS];
let currentIndex = 0;
let answer = [];
let score = 0;
let answeredCorrectly = [];
let currentScrambledWords = [];

// ===== ANNOUNCEMENTS FOR SCREEN READERS =====
function announce(message) {
  const status = document.getElementById("status");
  status.innerText = message;
}

// ===== INIT =====
function init() {
  answeredCorrectly = new Array(questions.length).fill(false);
  shuffleQuestions();
  currentIndex = 0;
  score = 0;
  loadQuestion();
  updateScore();
  updateNavigationButtons();
}

// ===== RANDOM ORDER =====
function shuffleQuestions() {
  questions.sort(() => Math.random() - 0.5);
}

// ===== UPDATE QUESTION NUMBER =====
function updateQuestionNumber() {
  const text = `Question ${currentIndex + 1} of ${questions.length}`;
  document.getElementById("questionNumber").innerText = text;
}

// ===== LOAD QUESTION =====
function loadQuestion() {
  let q = questions[currentIndex];

  document.getElementById("arabic").innerText = q.ar;
  announce("");

  let words = q.en.split(" ");
  let scrambled = shuffle([...words]);
  currentScrambledWords = scrambled;

  answer = [];
  document.getElementById("answer").innerText = "";
  document.getElementById("answer").className = "";

  let div = document.getElementById("scrambled");
  div.innerHTML = "";

  scrambled.forEach((word, index) => {
    let btn = document.createElement("button");
    btn.innerText = word;
    btn.setAttribute("aria-label", `Word option: ${word}`);

    btn.onclick = () => {
      speak(word);
      addWord(word);
      btn.disabled = true;
      announce(`Added: ${word}`);
    };

    btn.onkeypress = (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        btn.click();
      }
    };

    div.appendChild(btn);
  });

  updateNavigationButtons();
  updateQuestionNumber();
  announce("New question. Click words to arrange the sentence or press Full Sentence to listen.");
  speak("Arrange the sentence");
}

// ===== UPDATE NAVIGATION BUTTONS =====
function updateNavigationButtons() {
  document.getElementById("prevBtn").disabled = currentIndex === 0;
  document.getElementById("nextBtn").disabled = currentIndex === questions.length - 1;
}

// ===== SHUFFLE =====
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ===== ADD WORD =====
function addWord(word) {
  answer.push(word);
  document.getElementById("answer").innerText = answer.join(" ");
}

// ===== CLEAR =====
function clearAnswer() {
  answer = [];
  document.getElementById("answer").innerText = "";
  document.getElementById("answer").className = "";

  document.querySelectorAll("#scrambled button")
    .forEach(btn => btn.disabled = false);
  
  announce("Answer cleared. Ready for new attempt.");
}

// ===== CHECK =====
function checkAnswer() {
  let correct = questions[currentIndex].en;
  let answerDiv = document.getElementById("answer");

  if (answer.join(" ") === correct) {
    answerDiv.className = "correct";

    if (!answeredCorrectly[currentIndex]) {
      score++;
      answeredCorrectly[currentIndex] = true;
    }

    updateScore();
    announce("Correct! Well done!");
    speak("Correct");

    setTimeout(() => {
      if (currentIndex < questions.length - 1) {
        nextQuestion();
      }
    }, 800);

  } else {
    answerDiv.className = "wrong";
    announce("Incorrect. Please try again.");
    speak("Try again");
  }
}

// ===== SCORE =====
function updateScore() {
  document.getElementById("score").innerText =
    `Score: ${score} out of ${questions.length}`;
}

// ===== NAVIGATION =====
function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    loadQuestion();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

// ===== SPEECH =====
function speak(text) {
  speechSynthesis.cancel();
  let s = new SpeechSynthesisUtterance(text);
  s.rate = 0.7;
  s.lang = "en-US";
  speechSynthesis.speak(s);
}

function speakCurrent() {
  speak(questions[currentIndex].en);
}

// ===== SPEAK SLOW (FIXED - WAITS FOR EACH WORD TO FINISH) =====
function speakSlow() {
  let words = questions[currentIndex].en.split(" ");
  let i = 0;

  function speakNext() {
    if (i < words.length) {
      let utterance = new SpeechSynthesisUtterance(words[i]);
      utterance.rate = 0.7;
      utterance.lang = "en-US";
      
      // When this word finishes speaking, move to the next word
      utterance.onend = () => {
        i++;
        setTimeout(speakNext, 500);  // 500ms pause after each word finishes
      };
      
      speechSynthesis.cancel();  // Stop any current speech
      speechSynthesis.speak(utterance);
    }
  }

  speakNext();
}

// ===== SPEAK SCRAMBLED WORDS =====
function speakScrambledWords() {
  if (currentScrambledWords.length === 0) {
    announce("No scrambled words available.");
    return;
  }

  announce("Reading scrambled words one by one.");

  let i = 0;

  function speakNextWord() {
    if (i < currentScrambledWords.length) {
      speak(currentScrambledWords[i]);
      i++;
      setTimeout(speakNextWord, 1200);
    } else {
      announce("Finished reading all scrambled words.");
    }
  }

  setTimeout(speakNextWord, 2000);
}

// ===== LOAD CUSTOM SENTENCES =====
function loadCustom() {
  let text = document.getElementById("customInput").value;
  if (!text.trim()) {
    announce("Please enter sentences first.");
    return;
  }

  let lines = text.split("\n");
  let validQuestions = [];

  lines.forEach(line => {
    let parts = line.split("|");
    if (parts.length === 2) {
      let en = parts[0].trim();
      let ar = parts[1].trim();
      
      if (en && ar) {
        validQuestions.push({ en: en, ar: ar });
      }
    }
  });

  if (validQuestions.length === 0) {
    announce("Invalid format. Use: English | Arabic on each line.");
    return;
  }

  // Replace old questions with new ones
  questions = validQuestions;

  // Clear the textarea after loading
  document.getElementById("customInput").value = "";

  currentIndex = 0;
  score = 0;
  init();
  announce(`Custom questions loaded. ${validQuestions.length} questions added. Old sentences have been deleted.`);
}

// ===== RESET TO DEFAULT SENTENCES =====
function resetToDefault() {
  // Copy default questions back
  questions = [...DEFAULT_QUESTIONS];
  
  // Clear the textarea
  document.getElementById("customInput").value = "";

  currentIndex = 0;
  score = 0;
  init();
  announce("Reset to default sentences. All custom questions deleted.");
}

// ===== START =====
init();
</script>

</body>
</html>
